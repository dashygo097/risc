syntax = "proto3";

package risc;

import "cache_config.proto";
import "bpu_config.proto";
import "cpu_config.proto";
import "bus_config.proto";

option java_package = "arch.configs.proto";
option java_outer_classname = "RiscConfigProto";

message RiscConfig {
  bool is_debug = 1;
  CpuConfig cpu = 2;
  BpuConfig bpu = 3;
  CacheConfig l1i = 4;
  CacheConfig l1d = 5;
  BusConfig bus = 6;
}
