syntax = "proto3";

package risc;

option java_package = "arch.isa.proto";
option java_outer_classname = "IsaProto";

message InstructionEncoding {
  string name = 1;
  uint32 value = 2;
  uint32 mask = 3;
}

message InstructionSet {
  InstructionEncoding nop = 1;
  repeated InstructionEncoding encodings = 2;
}

message Isa {
  string name = 1;
  uint32 xlen = 2;
  uint32 ilen = 3;
  uint32 num_arch_regs = 4;
  bool is_big_endian = 5;
  uint32 micro_op_width = 6;
  InstructionSet instr_set = 7;
}
