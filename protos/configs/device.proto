syntax = "proto3";

package risc;

option java_package = "arch.configs.proto";
option java_outer_classname = "DeviceProto";

enum DeviceType {
  DEVICE_TYPE_UNSPECIFIED = 0;
  DEVICE_TYPE_SRAM = 1;
  DEVICE_TYPE_UART = 2;
  DEVICE_TYPE_IRH = 3;
}

message DeviceDescriptor {
  string name = 1;
  DeviceType type = 2;
  uint64 base = 3;
  uint64 size = 4;
}
