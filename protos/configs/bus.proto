syntax = "proto3";

package risc;

import "configs/device.proto";

option java_package = "arch.configs.proto";
option java_outer_classname = "BusConfigProto";

enum BusType {
  BUS_TYPE_UNKNOWN = 0;
  BUS_TYPE_AXIL = 1;
}

message BusConfig {
  BusType type = 1;
  uint32 crossbar_fifo_depth = 2;
  repeated DeviceDescriptor address_map = 3;
}
