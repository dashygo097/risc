syntax = "proto3";

package risc;

option java_package = "arch.configs.proto";
option java_outer_classname = "FunctionalUnitProto";

enum FunctionalUnitType {
  FUNCTIONAL_UNIT_TYPE_UNSPECIFIED = 0;
  FUNCTIONAL_UNIT_TYPE_ALU = 1;
  FUNCTIONAL_UNIT_TYPE_MULT = 2;
  FUNCTIONAL_UNIT_TYPE_LD = 3;
  FUNCTIONAL_UNIT_TYPE_ST = 4;
  FUNCTIONAL_UNIT_TYPE_BRU = 5;
  FUNCTIONAL_UNIT_TYPE_CSR = 6;
  FUNCTIONAL_UNIT_TYPE_DIV = 7;
}

message FunctionalUnitDescriptor {
  string name = 1;
  FunctionalUnitType type = 2;
}
