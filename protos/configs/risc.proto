syntax = "proto3";

package risc;

import "configs/cache.proto";
import "configs/ifu.proto";
import "configs/bpu.proto";
import "configs/regfile.proto";
import "configs/rob.proto";
import "configs/mem.proto";
import "configs/bus.proto";
import "configs/scheduler.proto";

option java_package = "arch.configs.proto";
option java_outer_classname = "RiscConfigProto";

message RiscConfig {
  uint64 freq = 1 ;
  IfuConfig ifu = 2;
  BpuConfig bpu = 3;
  RegfileConfig regfile = 4;
  SchedulerConfig scheduler = 5;
  RobConfig rob = 6;
  MemConfig mem = 7;
  CacheConfig l1i = 8;
  CacheConfig l1d = 9;
  BusConfig bus = 10;
}
