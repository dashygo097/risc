syntax = "proto3";

package risc;

option java_package = "arch.configs.proto";
option java_outer_classname = "CacheConfigProto";

enum ReplPolicy {
  REPL_POLICY_UNKNOWN = 0;
  REPL_POLICY_RANDOM = 1;
  REPL_POLICY_LRU = 2;
  REPL_POLICY_PSEUDO_LRU = 3;
}

message CacheConfig {
  uint32 sets = 1;
  uint32 ways = 2;
  uint32 line_size = 3;
  ReplPolicy repl_policy = 4;
}
